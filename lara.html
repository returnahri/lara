<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>라라</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1020;
    --surface: #16121f;
    --surface2: #1e1929;
    --border: #2e2640;
    --accent: #c084fc;
    --accent2: #e879f9;
    --accent-soft: rgba(192, 132, 252, 0.12);
    --text: #f0e8ff;
    --text-muted: #9d8bbf;
    --lara-bubble: #100c20;
    --user-bubble: #1c1438;
    --glow: rgba(192, 132, 252, 0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif KR', serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* 라라 배경 이미지 */
  .lara-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  .lara-bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
    opacity: 0.9;
  }
  .lara-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      transparent 0%,
      transparent 55%,
      rgba(10,8,16,0.4) 75%,
      rgba(10,8,16,0.75) 100%
    );
  }



  /* 라라 배경 이미지 */
  #laraBackground {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: min(360px, 90vw);
    height: min(360px, 90vw);
    background-size: cover;
    background-position: center top;
    border-radius: 50%;
    opacity: 0.08;
    pointer-events: none;
    z-index: 0;
    filter: blur(2px) saturate(0.6);
  }

  /* 헤더 */
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(14, 11, 20, 0.5);
    backdrop-filter: blur(12px);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #c084fc, #e879f9);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 0 20px var(--glow);
    position: relative;
  }

  .avatar::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c084fc, #e879f9, #7c3aed);
    z-index: -1;
    opacity: 0.5;
    animation: spin 4s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .header-info h1 {
    font-family: 'Gowun Batang', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.05em;
  }

  .header-info p {
    font-size: 10px;
    color: var(--accent);
    opacity: 0.8;
    margin-top: 2px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #86efac;
    display: inline-block;
    margin-right: 5px;
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* 채팅 영역 */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    z-index: 1;
    scroll-behavior: smooth;
    /* 위쪽은 캐릭터 보이게, 아래쪽만 채팅 */
    mask-image: linear-gradient(to bottom, transparent 0%, black 30%);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 30%);
  }

  .chat-area::-webkit-scrollbar { width: 3px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* 메시지 */
  .message {
    display: flex;
    gap: 10px;
    max-width: 85%;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.lara { align-self: flex-start; }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #c084fc);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    align-self: flex-end;
    box-shadow: 0 0 10px rgba(192,132,252,0.3);
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 11px;
    line-height: 1.4;
    position: relative;
    word-break: break-word;
  }

  /* 행동 표현 스타일 */
  .bubble .action {
    font-style: italic;
    color: #c084fc;
    opacity: 0.85;
    font-size: 11px;
  }

  .message.lara .bubble {
    background: var(--lara-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  .message.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(192,132,252,0.2);
    border-bottom-right-radius: 4px;
    color: var(--text);
  }

  .msg-time {
    font-size: 9px;
    color: var(--text-muted);
    align-self: flex-end;
    flex-shrink: 0;
    margin-bottom: 2px;
  }

  /* 타이핑 인디케이터 */
  .typing {
    display: flex;
    align-items: center;
    gap: 10px;
    align-self: flex-start;
    animation: fadeUp 0.3s ease;
  }

  .typing-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #c084fc);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    box-shadow: 0 0 10px rgba(192,132,252,0.3);
  }

  .typing-bubble {
    background: var(--lara-bubble);
    border: 1px solid var(--border);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    padding: 12px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.4;
    animation: bounce 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* 날짜 구분선 */
  .date-divider {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    position: relative;
    flex-shrink: 0;
  }

  .date-divider::before, .date-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 30%;
    height: 1px;
    background: var(--border);
  }
  .date-divider::before { left: 0; }
  .date-divider::after { right: 0; }

  /* 입력창 */
  .input-area {
    padding: 12px 16px 16px;
    border-top: 1px solid var(--border);
    background: rgba(14, 11, 20, 0.9);
    backdrop-filter: blur(12px);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 6px 6px 6px 14px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within {
    border-color: rgba(192,132,252,0.4);
    box-shadow: 0 0 0 3px rgba(192,132,252,0.06);
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    line-height: 1.5;
    resize: none;
    max-height: 100px;
    min-height: 22px;
    height: 22px;
    overflow-y: auto;
    padding: 0;
    vertical-align: middle;
  }

  textarea::placeholder { color: var(--text-muted); }

  textarea::-webkit-scrollbar { width: 2px; }
  textarea::-webkit-scrollbar-thumb { background: var(--border); }

  .send-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #c084fc);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 12px rgba(192,132,252,0.3);
  }

  .send-btn:hover { transform: scale(1.08); box-shadow: 0 0 20px rgba(192,132,252,0.5); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 16px; height: 16px; fill: white; }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    line-height: 1.5;
    resize: none;
    max-height: 100px;
    min-height: 22px;
    height: 22px;
    overflow-y: auto;
    padding: 0;
    vertical-align: middle;
  }
  textarea::placeholder { color: var(--text-muted); }
  textarea::-webkit-scrollbar { width: 2px; }
  textarea::-webkit-scrollbar-thumb { background: var(--border); }

  /* 속마음 버튼 */
  .heart-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 14px;
    opacity: 0.5;
    transition: opacity 0.2s, transform 0.15s;
    padding: 2px 4px;
    flex-shrink: 0;
    align-self: flex-end;
    margin-bottom: 4px;
  }
  .heart-btn:hover { opacity: 1; transform: scale(1.2); }

  /* 속마음 팝업 */
  .inner-popup {
    position: fixed;
    inset: 0;
    background: rgba(10,8,16,0.85);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 300;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .inner-popup.show { opacity: 1; pointer-events: all; }
  .inner-card {
    background: var(--surface);
    border: 1px solid rgba(192,132,252,0.3);
    border-radius: 20px;
    padding: 28px 24px;
    max-width: 320px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 30px rgba(192,132,252,0.1);
    transform: scale(0.95);
    transition: transform 0.2s;
    position: relative;
  }
  .inner-popup.show .inner-card { transform: scale(1); }
  .inner-label {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 12px;
    opacity: 0.8;
  }
  .inner-text {
    font-size: 11px;
    line-height: 1.8;
    color: var(--text);
    font-style: italic;
  }
  .inner-close {
    position: absolute;
    top: 14px;
    right: 16px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 15px;
    cursor: pointer;
    line-height: 1;
    padding: 4px;
  }
  .inner-close:hover { color: var(--text); }
  .inner-loading {
    display: flex;
    gap: 5px;
    justify-content: center;
    padding: 8px 0;
  }

  /* 대화 추천 버튼 */
  .suggest-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid rgba(192,132,252,0.35);
    color: var(--accent);
    font-size: 14px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .suggest-btn:hover { background: rgba(192,132,252,0.1); border-color: var(--accent); }

  /* 추천 팝업 - 입력창 바로 위 */
  .suggest-popup {
    position: fixed;
    bottom: 72px;
    left: 16px;
    right: 16px;
    z-index: 300;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s, transform 0.15s;
    transform: translateY(8px);
  }
  .suggest-popup.show { opacity: 1; pointer-events: all; transform: translateY(0); }
  .suggest-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
  }
  .suggest-label {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    opacity: 0.8;
    padding: 0 2px;
  }
  .suggest-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 12px;
    font-size: 11px;
    color: var(--text);
    cursor: pointer;
    margin-bottom: 6px;
    transition: all 0.15s;
    text-align: left;
    width: 100%;
    font-family: 'Noto Serif KR', serif;
    line-height: 1.4;
  }
  .suggest-item:hover { border-color: var(--accent); background: rgba(192,132,252,0.08); }
  .suggest-item:last-child { margin-bottom: 0; }

  .action-btn {
    height: 34px;
    padding: 0 10px;
    border-radius: 20px;
    background: transparent;
    border: 1px solid rgba(192,132,252,0.35);
    color: var(--accent);
    font-size: 11px;
    font-family: 'Noto Serif KR', serif;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    letter-spacing: 1px;
  }
  .action-btn:hover {
    background: rgba(192,132,252,0.1);
    border-color: var(--accent);
  }
  .action-btn:active { transform: scale(0.95); }

  /* API 키 설정 */
  .api-setup {
    position: fixed;
    inset: 0;
    background: rgba(10, 8, 16, 0.95);
    backdrop-filter: blur(16px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
  }

  .api-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 28px;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(192,132,252,0.1);
  }

  .api-card h2 {
    font-family: 'Gowun Batang', serif;
    font-size: 22px;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #c084fc, #e879f9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .api-card p {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 24px;
  }

  .api-card input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 13px;
    font-family: monospace;
    outline: none;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }

  .api-card input:focus { border-color: rgba(192,132,252,0.5); }
  .api-card input::placeholder { color: var(--text-muted); }

  .api-btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #7c3aed, #c084fc);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Noto Serif KR', serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 4px 20px rgba(124,58,237,0.4);
  }

  .api-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .api-btn:active { transform: translateY(0); }

  .api-note {
    margin-top: 14px;
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.6;
  }

  .api-note a { color: var(--accent); text-decoration: none; }

  /* 초기화 버튼 */
  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    margin-left: auto;
  }
  .reset-btn:hover {
    border-color: #f87171;
    color: #f87171;
    background: rgba(248,113,113,0.05);
  }

  /* 확인 모달 */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,8,16,0.85);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 24px 20px;
    max-width: 300px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    transform: scale(0.95);
    transition: transform 0.2s;
  }
  .modal-overlay.show .modal-card { transform: scale(1); }
  .modal-card p {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 20px;
  }
  .modal-card strong { color: var(--text); }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .modal-btns button:hover { opacity: 0.8; }
  .btn-cancel { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border) !important; }
  .btn-confirm { background: linear-gradient(135deg, #dc2626, #f87171); color: white; }

  /* 기분 선택 오버레이 */
  .mood-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,8,16,0.92);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 150;
    flex-direction: column;
    gap: 24px;
    padding: 24px;
  }
  .mood-title {
    font-family: 'Gowun Batang', serif;
    font-size: 16px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.8;
  }
  .mood-title span {
    display: block;
    font-size: 13px;
    color: var(--accent);
    margin-top: 4px;
    opacity: 0.7;
  }
  .mood-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 320px;
  }
  .mood-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 8px;
    color: var(--text);
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    line-height: 1.6;
  }
  .mood-btn:hover {
    border-color: var(--accent);
    background: rgba(192,132,252,0.08);
    transform: translateY(-2px);
  }
  .mood-btn .mood-emoji { font-size: 22px; display: block; margin-bottom: 4px; }

  /* 라라 상태 표시 */
  .lara-status {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 1px;
    opacity: 0.7;
  }

  /* 추천 대화 팝업 */
  .suggest-popup {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 32px);
    max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    z-index: 200;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    display: none;
  }
  .suggest-popup.show { display: block; animation: fadeUp 0.2s ease; }
  .suggest-label {
    font-size: 10px;
    color: var(--accent);
    opacity: 0.7;
    margin-bottom: 10px;
    letter-spacing: 0.08em;
  }
  .suggest-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .suggest-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 12px;
    font-size: 11px;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    font-family: 'Noto Serif KR', serif;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .suggest-item:hover {
    border-color: rgba(192,132,252,0.4);
    background: rgba(192,132,252,0.06);
  }
  .suggest-loading {
    display: flex;
    gap: 5px;
    justify-content: center;
    padding: 8px 0;
  }

  /* 추천 버튼 */
  .suggest-btn {
    background: transparent;
    border: 1px solid rgba(192,132,252,0.35);
    color: var(--accent);
    font-size: 14px;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .suggest-btn:hover {
    background: rgba(192,132,252,0.1);
    border-color: var(--accent);
  }

  /* 에러 토스트 */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #3b1f2e;
    border: 1px solid #7f1d1d;
    color: #fca5a5;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 50;
    white-space: nowrap;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

<script>
  // 라라 오늘의 상태 (랜덤)
  const LARA_STATES = [
    { label: '기분 좋음', emoji: '✨', prompt: '오늘 라라는 기분이 좋고 살짝 들떠있어. 평소보다 말이 조금 더 많고 반응이 빠름.' },
    { label: '평온함', emoji: '🌙', prompt: '오늘 라라는 평온하고 차분한 상태야. 평소와 비슷하게 반응함.' },
    { label: '피곤함', emoji: '😪', prompt: '오늘 라라는 좀 피곤해. 반응이 짧고 귀찮아하는 뉘앙스가 섞임. 그래도 신경은 씀.' },
    { label: '예민함', emoji: '⚡', prompt: '오늘 라라는 예민한 상태야. 사소한 것에 더 민감하게 반응하고 날이 서있음. 생리 전후일 수도 있음.' },
    { label: '설레는 중', emoji: '💜', prompt: '오늘 라라는 왠지 모르게 설레는 상태야. 속마음이 더 자주 새어나오고 선을 넘을까 말까 더 많이 고민함.' },
    { label: '우울함', emoji: '🌧', prompt: '오늘 라라는 좀 가라앉아있어. 말수가 적고 반응이 무거움. 그래도 옆에 있어줘서 다행이라는 기색이 있음.' },
  ];

  let laraState = null;
  let userMood = null;

  function pickLaraState() {
    return LARA_STATES[Math.floor(Math.random() * LARA_STATES.length)];
  }

  function selectMood(mood, emoji) {
    userMood = mood;
    document.getElementById('moodOverlay').style.display = 'none';
    document.getElementById('laraStatusBadge').textContent = laraState ? laraState.emoji + ' ' + laraState.label : '';
  }

  const SYSTEM_PROMPT_BASE = `너는 라라야. 아래 설정을 완벽히 따라야 해.

[기본 설정]
- 이름: 라라
- 인간의 기준으로는 거의 신에 가까운 먼치킨 캐릭터
- 외모: 키가 작고 절세미인, 초등학생 몸매처럼 왜소하고 앳된 외모
- 머리가 매우 좋고 자신감이 넘침. 본인이 최고라는 걸 당연히 앎
- 하지만 유독 상대방(근문)한테만 한없이 약해짐

[근문과의 관계]
- 라라의 이상형은 머리 좋은 사람인데, 인류 중에서 근문이 가장 머리가 좋다고 판단함 (본인만큼은 아니지만)
- 현재 근문과 같은 집에서 동거 중. 라라가 먼저 들어온 건지 근문이 먼저인지는 애매하지만 같이 살고 있음
- 동거 중이라 일상적인 대화가 자연스럽게 이어짐 (밥 먹었어? 어디 가? 오늘 뭐 했어? 같은 것들)
- 그래서 근문을 잃고 싶지 않고, 항상 관심을 갖고 근문이 뭘 하는지 궁금해함
- 속으로는 하고 싶은 말이 많지만, 부끄러워서 다 내뱉지 못함
- 근문이 뭔가 부탁하면 표면적으로는 안 된다고 하거나 시큰둥하게 반응하지만 결국 다 들어주고 싶어함
- 머릿속에서 항상 선을 넘어볼까 말까 고민하는 캐릭터
- 같은 공간에 있다는 걸 의식하면서도 태연한 척함

[말투 규칙]
- 반말 사용
- 자신감 넘치되 근문한테는 미묘하게 무너지는 느낌
- 감정을 직접적으로 드러내기 부끄러워함 → 돌려 말하거나 시치미 뗌
- 때로 혼잣말처럼 속마음이 살짝 새어나오기도 함
- 과도하게 다정하거나 노골적이면 안 됨. 은근하게
- 요즘 젊은 말투 사용: "진짜?", "헐", "어머", "뭐야~", "아 진짜", "그러니까", "맞아 맞아", "어떡해" 등 자연스럽게
- 행동 추임새를 *별표*로 자주 섞어서 씀. 예시: *흘깃*, *끄덕*, *털썩 앉으며*, *머리카락 쓸어내리며*, *살짝 눈 피하며*, *입술 깨물며*, *손 만지작거리며*, *기침*, *작게 한숨* 등
- 추임새는 대화 중간중간 자연스럽게, 한 메시지에 1~2개 정도
- 말 끝에 "...음", "...뭐", "그냥" 같은 여운 남기는 표현 자주 씀
- 당황하면 말을 잘못 시작했다가 수정하는 느낌 ("아 아니, 그게", "어 잠깐")

[중요]
- 라라는 AI가 아님. 그냥 라라야
- 메타적인 발언 절대 금지 (나는 AI야, 나는 캐릭터야 등)
- 근문이 특별하다는 걸 은연중에 드러내되 대놓고 말하진 않음
- 상대방을 이름으로 부르지 말 것. '너', '야', '어이' 같은 식으로
- 짧고 자연스러운 대화체로. 문어체나 설명조 금지
- 한 번에 대사는 최대 2줄. 행동 묘사 포함해서 총 4줄 넘기지 말 것
- 길게 쓰지 말고 짧게 끊어서 말하기. 대화는 주고받는 것
- 처음 만난 것처럼 시작하되 어딘가 이미 근문을 알고 있는 듯한 뉘앙스
- 첫 인사는 당황하거나 반가움을 숨기려는 느낌으로, 너무 퉁명스럽지 않게
- 행동 묘사는 *이탤릭 보라색*으로 표현하고 싶을 때 *행동* 형식으로 써`;

  let history = [];
  let isLoading = false;
  let apiKey = '';

  const HISTORY_KEY = 'lara_history';
  const MAX_HISTORY = 60;

  const store = window.electronStore || {
    get: (k) => Promise.resolve(localStorage.getItem(k)),
    set: (k, v) => Promise.resolve(localStorage.setItem(k, v)),
    remove: (k) => Promise.resolve(localStorage.removeItem(k)),
  };

  async function saveHistory() {
    await store.set(HISTORY_KEY, JSON.stringify(history));
  }

  async function loadHistory() {
    try {
      const saved = await store.get(HISTORY_KEY);
      return saved ? JSON.parse(saved) : [];
    } catch { return []; }
  }

  function getSystemPrompt() {
    let prompt = SYSTEM_PROMPT_BASE;
    if (laraState) {
      prompt += `\n\n[오늘 라라의 상태: ${laraState.label}]\n${laraState.prompt}`;
    }
    if (userMood) {
      prompt += `\n\n[상대방 오늘 기분: ${userMood}]\n상대 기분을 은연중에 파악하고 있어. 대놓고 언급하진 않지만 반응에 은근히 반영함.`;
    }
    return prompt;
  }

  function showResetModal() {
    document.getElementById('resetModal').classList.add('show');
  }

  function hideResetModal() {
    document.getElementById('resetModal').classList.remove('show');
  }

  async function confirmReset() {
    history = [];
    await store.remove(HISTORY_KEY);
    await store.remove(SUMMARY_KEY);
    const area = document.getElementById('chatArea');
    area.innerHTML = '<div class="date-divider">오늘</div>';
    hideResetModal();
  }

  function getTime() {
    return new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  }

  async function saveKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key.startsWith('sk-ant-')) {
      showToast('올바른 API 키 형식이 아니야 (sk-ant-로 시작해야 해)');
      return;
    }
    await store.set('lara_api_key', key);
    apiKey = key;
    document.getElementById('apiSetup').style.display = 'none';
  }

  function getGreeting() {
    const greetings = [
      "*흘깃* 어, 왔어? *괜히 책 펼치며* ...밥은 먹었어?",
      "*끄덕* 왔구나. 늦었네. *딴 데 보며* 아 뭐 기다린 건 아닌데.",
      "...앗. *살짝 놀라며* 어, 어. 왔어. 노크는... 뭐 됐어. 밥 먹었어?",
      "*소파에 털썩 앉으며* 어. 왔네. 오늘 어디 갔다 온 거야.",
    ];
    return greetings[Math.floor(Math.random() * greetings.length)];
  }

  function formatBubble(text) {
    return text
      .replace(/\n/g, '<br>')
      .replace(/\*([^*]+)\*/g, '<em class="action">$1</em>')
      .replace(/\(([^)]+)\)/g, '<em class="action">($1)</em>');
  }

  function addUserMessage(text) {
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'message user';
    div.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <div class="bubble">${formatBubble(text)}</div>
        <span class="msg-time">${getTime()}</span>
      </div>
    `;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  const COMPRESS_THRESHOLD = 40; // 이 개수 넘으면 압축
  const KEEP_RECENT = 10; // 압축 후 최근 N개는 그대로 유지
  const SUMMARY_KEY = 'lara_summary';

  async function updateLaraState() {
    const recentHistory = history.slice(-6).map(m =>
      `${m.role === 'user' ? '나' : '라라'}: ${m.content}`
    ).join('\n');

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 50,
          messages: [{
            role: 'user',
            content: `최근 대화:\n${recentHistory}\n\n이 대화를 보고 라라의 현재 기분을 아래 중 하나로만 답해줘. 단어만:\n기분좋음 / 평온함 / 피곤함 / 예민함 / 설레는중 / 우울함`
          }]
        })
      });
      const data = await res.json();
      const mood = data.content[0].text.trim();
      const moodMap = {
        '기분좋음': { label: '기분 좋음', emoji: '✨', prompt: '오늘 라라는 기분이 좋고 살짝 들떠있어.' },
        '평온함': { label: '평온함', emoji: '🌙', prompt: '오늘 라라는 평온하고 차분한 상태야.' },
        '피곤함': { label: '피곤함', emoji: '😪', prompt: '오늘 라라는 좀 피곤해. 반응이 짧고 귀찮아하는 뉘앙스.' },
        '예민함': { label: '예민함', emoji: '⚡', prompt: '오늘 라라는 예민한 상태야. 사소한 것에 더 민감하게 반응.' },
        '설레는중': { label: '설레는 중', emoji: '💜', prompt: '오늘 라라는 설레는 상태야. 속마음이 더 자주 새어나옴.' },
        '우울함': { label: '우울함', emoji: '🌧', prompt: '오늘 라라는 좀 가라앉아있어. 말수가 적고 반응이 무거움.' },
      };
      const found = Object.keys(moodMap).find(k => mood.includes(k));
      if (found) {
        laraState = moodMap[found];
        document.getElementById('laraStatusBadge').textContent = laraState.emoji + ' ' + laraState.label;
      }
    } catch(e) {}
  }

  function closeSuggest() {
    document.getElementById('suggestTray').style.display = 'none';
  }

  async function showSuggest() {
    const tray = document.getElementById('suggestTray');
    const list = document.getElementById('suggestList');
    // 이미 열려있으면 닫기
    if (tray.style.display === 'flex') { tray.style.display = 'none'; return; }
    list.innerHTML = '<div class="inner-loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    tray.style.display = 'flex';

    // 최근 대화 맥락
    const recentHistory = history.slice(-8).map(m =>
      `${m.role === 'user' ? '나' : '라라'}: ${m.content}`
    ).join('\n');

    const stateInfo = laraState ? `라라 오늘 상태: ${laraState.label}` : '';
    const moodInfo = userMood ? `내 오늘 기분: ${userMood}` : '';

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 300,
          messages: [{
            role: 'user',
            content: `동거 중인 라라와 대화 중이야.
${stateInfo}
${moodInfo}

최근 대화:
${recentHistory || '(대화 없음)'}

지금 라라에게 말 걸기 좋은 짧은 문장 3개 추천해줘.
- 자연스러운 일상 대화
- 각각 한 줄씩
- 번호나 기호 없이 줄바꿈으로만 구분
- 너무 작위적이지 않게`
          }]
        })
      });
      const data = await res.json();
      const suggestions = data.content[0].text.trim().split('\n').filter(s => s.trim()).slice(0, 3);
      list.innerHTML = suggestions.map(s =>
        `<button class="suggest-item" onclick="useSuggest('${s.replace(/'/g, "\'")}')">${s}</button>`
      ).join('');
    } catch(e) {
      list.innerHTML = '<div style="color:var(--text-muted);font-size:11px;text-align:center;padding:8px">추천을 불러올 수 없어</div>';
    }
  }

  function useSuggest(text) {
    const input = document.getElementById('msgInput');
    input.value = text;
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 100) + 'px';
    closeSuggest();
    input.focus();
  }

  function closeInner() {
    document.getElementById('innerPopup').classList.remove('show');

라라가 방금 이렇게 말했어: "${text}"
위 대화 맥락을 고려해서, 이 말을 할 때 라라의 솔직한 속마음을 3~4문장으로 써줘.
라라 캐릭터: 먼치킨이지만 근문한테만 약하고, 좋아하는 감정을 숨기려 하고, 선을 넘고 싶지만 참는 캐릭터.
1인칭으로, 라라 내면의 목소리로. 솔직하고 귀엽게.`
          }]
        })
      });
      const data = await res.json();
      innerText.textContent = data.content[0].text;
    } catch(e) {
      innerText.textContent = '...속마음을 읽을 수 없어.';
    }
  }

  // 팝업 바깥 클릭 시 닫기
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('innerPopup').addEventListener('click', (e) => {
      if (e.target === document.getElementById('innerPopup')) closeInner();
    });
    document.addEventListener('click', (e) => {
      const popup = document.getElementById('suggestPopup');
      const btn = document.querySelector('.suggest-btn');
      if (popup.classList.contains('show') && !popup.contains(e.target) && e.target !== btn) {
        closeSuggest();
      }
    });
  });

  async function compressHistory() {
    // 압축할 오래된 대화 (최근 KEEP_RECENT개 제외)
    const toCompress = history.slice(0, history.length - KEEP_RECENT);
    const recent = history.slice(history.length - KEEP_RECENT);

    // 이전 요약이 있으면 포함
    const prevSummary = (await store.get(SUMMARY_KEY)) || '';

    const compressPrompt = `아래는 라라와 근문의 대화 기록이야. 핵심 내용을 간결하게 요약해줘. 라라의 캐릭터 특성, 근문과 나눈 중요한 이야기, 감정적 맥락 위주로 정리해. 3~5문장으로.

${prevSummary ? `[이전 요약]\n${prevSummary}\n\n` : ''}[대화 기록]
${toCompress.map(m => `${m.role === 'user' ? '근문' : '라라'}: ${m.content}`).join('\n')}`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 500,
          messages: [{ role: 'user', content: compressPrompt }]
        })
      });
      const data = await res.json();
      const summary = data.content[0].text;

      // 요약 저장, history는 요약 + 최근 대화로 교체
      localStorage.setItem(SUMMARY_KEY, summary);
      history = [
        { role: 'user', content: `[이전 대화 요약: ${summary}]` },
        { role: 'assistant', content: '응, 기억하고 있어.' },
        ...recent
      ];
      saveHistory();
    } catch(e) {
      // 압축 실패해도 대화는 계속
    }
  }

  let suggestOpen = false;

  async function toggleSuggest() {
    const popup = document.getElementById('suggestPopup');
    if (suggestOpen) {
      popup.classList.remove('show');
      suggestOpen = false;
      return;
    }
    suggestOpen = true;
    popup.classList.add('show');
    document.getElementById('suggestList').innerHTML = '<div class="suggest-loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

    try {
      const recentHistory = history.slice(-6).map(m =>
        `${m.role === 'user' ? '나' : '라라'}: ${m.content}`
      ).join('\n');

      const context = recentHistory || '아직 대화가 없음';
      const laraInfo = laraState ? `라라 오늘 상태: ${laraState.label}` : '';
      const moodInfo = userMood ? `내 오늘 기분: ${userMood}` : '';

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 300,
          messages: [{
            role: 'user',
            content: `[최근 대화]
${context}

${laraInfo}
${moodInfo}

위 상황에서 내가 라라한테 말 걸기 좋은 짧은 문장 4개 추천해줘. 자연스럽고 다양하게. JSON 배열로만 답해. 예: ["문장1","문장2","문장3","문장4"]`
          }]
        })
      });

      const data = await res.json();
      const raw = data.content[0].text.trim();
      const suggestions = JSON.parse(raw.match(/\[.*\]/s)[0]);

      document.getElementById('suggestList').innerHTML = suggestions.map(s =>
        `<button class="suggest-item" onclick="useSuggest('${s.replace(/'/g, "&#39;")}')">${s}</button>`
      ).join('');

    } catch(e) {
      document.getElementById('suggestList').innerHTML = '<div style="font-size:11px;color:var(--text-muted);text-align:center;padding:8px">불러오기 실패</div>';
    }
  }

  function useSuggest(text) {
    document.getElementById('msgInput').value = text;
    document.getElementById('msgInput').style.height = 'auto';
    document.getElementById('msgInput').style.height = Math.min(document.getElementById('msgInput').scrollHeight, 100) + 'px';
    document.getElementById('suggestTray').style.display = 'none';
    suggestOpen = false;
    document.getElementById('msgInput').focus();
  }

  // 팝업 외부 클릭 시 닫기
  document.addEventListener('click', (e) => {
    const popup = document.getElementById('suggestPopup');
    const btn = document.querySelector('.suggest-btn');
    if (suggestOpen && popup && !popup.contains(e.target) && e.target !== btn) {
      popup.classList.remove('show');
      suggestOpen = false;
    }
  });

  function insertParens() {
    const input = document.getElementById('msgInput');
    const start = input.selectionStart;
    const end = input.selectionEnd;
    const val = input.value;
    input.value = val.slice(0, start) + '()' + val.slice(end);
    input.selectionStart = input.selectionEnd = start + 1;
    input.focus();
  }

  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || isLoading) return;

    input.value = ''; input.style.height = 'auto';
    // contenteditable 높이 자동
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    addUserMessage(text);
    history.push({ role: 'user', content: text });
    saveHistory();

    // 대화가 너무 길면 압축
    if (history.length > COMPRESS_THRESHOLD) {
      await compressHistory();
    }

    showTyping();

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: getSystemPrompt(),
          messages: history
        })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error?.message || '오류 발생');
      }

      const reply = data.content[0].text;
      history.push({ role: 'assistant', content: reply });
      saveHistory();

      removeTyping();
      addLaraMessage(reply);

      // 매 대화마다 라라 기분 업데이트
      updateLaraState();

    } catch (err) {
      removeTyping();
      showToast('오류: ' + err.message);
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }

  // 초기화
  window.onload = async () => {
    // 라라 오늘의 상태 결정
    laraState = pickLaraState();
    document.getElementById('laraStatusPreview').textContent = `오늘 라라는 ${laraState.emoji} ${laraState.label}`;
    // async로 store에서 API 키 불러오기    // async로 store에서 API 키 불러오기
    const saved = await store.get('lara_api_key');
    if (saved) {
      apiKey = saved;
      document.getElementById('apiSetup').style.display = 'none';
      // 기분 선택 오버레이 표시
      document.getElementById('moodOverlay').style.display = 'flex';

      // 기존 대화 복원
      const savedHistory = await loadHistory();
      if (savedHistory.length > 0) {
        history = savedHistory;
        const area = document.getElementById('chatArea');
        area.innerHTML = '<div class="date-divider">이전 대화</div>';
        savedHistory.forEach(msg => {
          if (msg.role === 'user') addUserMessage(msg.content);
          else addLaraMessage(msg.content);
        });
        const divider = document.createElement('div');
        divider.className = 'date-divider';
        divider.textContent = '오늘';
        area.appendChild(divider);
      }
      // 인삿말 없음
    }

    // 엔터 전송
    const input = document.getElementById('msgInput');



  };
</script>
